<!DOCTYPE html>
<html>
<head>
    <title>Breast Cancer Prediction</title>
    <style>
        body {
            font-family: Arial;
            text-align: center;
            background-color: #f4f4f4;
        }
        h2 {
            margin-top: 20px;
        }
        form {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            width: 80%;
            margin: auto;
        }
        input {
            padding: 8px;
        }
        button {
            grid-column: span 3;
            padding: 10px;
            background: green;
            color: white;
            border: none;
            cursor: pointer;
        }
        #result {
            margin-top: 20px;
            font-size: 18px;
        }
    </style>
</head>
<body>

<h2>Breast Cancer Prediction</h2>

<form id="predictForm">
    <!-- 30 Inputs -->
    <script>
        for (let i = 1; i <= 30; i++) {
            document.write(`<input type="number" step="any" placeholder="Feature ${i}" required>`);
        }
    </script>

    <button type="submit">Predict</button>
</form>

<div id="result"></div>

<script>
document.getElementById("predictForm").addEventListener("submit", async function(e) {
    e.preventDefault();

    let inputs = document.querySelectorAll("input");
    let features = [];

    inputs.forEach(input => {
        features.push(parseFloat(input.value));
    });

    const response = await fetch("/predict", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({ features: features })
    });

    const data = await response.json();

    document.getElementById("result").innerHTML = `
        <b>Prediction:</b> ${data.prediction == 1 ? "Benign" : "Malignant"} <br>
        <b>Probability:</b> ${JSON.stringify(data.probability)}
    `;
});
</script>

</body>
</html>
